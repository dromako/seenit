<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SeenIt" />
<link rel="icon" type="image/svg+xml" href="/seenit/favicon.svg" />
<link rel="apple-touch-icon" href="/seenit/icon-192.png" />
<link rel="manifest" href="/seenit/manifest.json" />
<title>SeenIt</title>
<style>
:root {
  --bg: #0a0a0f;
  --panel: #14141c;
  --panel-2: #1c1c27;
  --border: #2a2a38;
  --text: #e6e6ef;
  --muted: #8b8b9e;
  --accent: #7c5cff;
  --accent-hover: #9078ff;
  --star: #ffb547;
  --danger: #ff5c7a;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  min-height: 100dvh;
  -webkit-text-size-adjust: 100%;
}
#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px 16px 96px;
  min-height: 100dvh;
}
h1, h2, h3 { margin: 0 0 12px; font-weight: 600; }
h1 { font-size: 22px; }
h2 { font-size: 17px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
h3 { font-size: 15px; }
button, input, select, textarea {
  font: inherit;
  color: inherit;
  background: transparent;
  border: none;
  outline: none;
}
input[type=search], input[type=text], input[type=number], select, textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
button {
  cursor: pointer;
  padding: 10px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-weight: 500;
  transition: background 0.15s, border-color 0.15s;
}
button:hover { background: var(--panel-2); }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary:hover { background: var(--accent-hover); }
button.danger { color: var(--danger); }
button.ghost { background: transparent; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.row { display: flex; gap: 8px; align-items: center; }
.stack { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
}
.muted { color: var(--muted); font-size: 13px; }
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--panel-2);
  color: var(--muted);
  font-size: 11px;
  margin-right: 4px;
}
.results { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
.result {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 12px;
  padding: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  align-items: center;
}
.result img, .poster-fallback {
  width: 60px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  background: var(--panel-2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 22px;
}
.result-info { min-width: 0; }
.result-title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.result-meta { color: var(--muted); font-size: 13px; }
.stars { display: inline-flex; gap: 2px; user-select: none; }
.star { cursor: pointer; color: var(--border); font-size: 20px; }
.star.filled { color: var(--star); }
.badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--muted);
}
.badge.watched { border-color: #2d5c3a; color: #6fd88e; background: rgba(111,216,142,0.08); }
.badge.watchlist { border-color: #4a4090; color: #9a89ff; background: rgba(154,137,255,0.08); }
.badge.rated { border-color: var(--star); color: var(--star); background: rgba(255,181,71,0.08); }
nav.tabs {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  z-index: 10;
}
nav.tabs a {
  padding: 6px 0;
  text-align: center;
  color: var(--muted);
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
}
nav.tabs a.active { color: var(--accent); }
nav.tabs a svg { display: block; margin: 0 auto 3px; }
.detail-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
.detail-actions button { padding: 12px 4px; font-size: 13px; }
.detail-actions button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.filter-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
.filter-bar button { flex: 0 0 auto; padding: 6px 12px; font-size: 13px; }
.filter-bar button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.hero {
  background: linear-gradient(135deg, rgba(124,92,255,0.15), rgba(124,92,255,0.02));
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.detail-hero { display: grid; grid-template-columns: 100px 1fr; gap: 14px; margin-bottom: 12px; }
.detail-hero img, .detail-hero .poster-fallback {
  width: 100px; height: 150px; border-radius: 8px;
}
.rating-picker { display: flex; gap: 4px; justify-content: center; margin: 12px 0; }
.rating-picker button {
  width: 32px; height: 32px; padding: 0; font-size: 13px;
  border-radius: 8px;
}
.rating-picker button.on { background: var(--star); border-color: var(--star); color: #000; }
.file-drop {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.file-drop:hover, .file-drop.dragover { border-color: var(--accent); background: var(--panel); }
.file-drop input { display: none; }
.stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.stat:last-child { border-bottom: none; }
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 13px;
  z-index: 100;
  animation: toastIn 0.2s ease-out;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.back { display: inline-flex; align-items: center; gap: 4px; margin-bottom: 10px; color: var(--muted); cursor: pointer; }
.back:hover { color: var(--text); }
</style>
</head>
<body>
<div id="app"><div class="empty"><span class="spinner"></span></div></div>
<script src="/seenit/app.js"></script>
</body>
</html>
