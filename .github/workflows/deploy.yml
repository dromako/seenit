name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download pre-built dist
        run: |
          curl -fsSL -H "bypass-tunnel-reminder: true" \
            "https://upset-trees-switch.loca.lt/dist.tar.gz" \
            -o dist.tar.gz
          mkdir -p dist
          tar xzf dist.tar.gz -C dist
          ls -la dist/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
